[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "frame-ancestors *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
